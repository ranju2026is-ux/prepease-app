<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepEase | Karnataka & SSC Mastery Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { scroll-behavior: smooth; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
            overflow-x: hidden; 
        }
        
        .hero-gradient {
            background: radial-gradient(circle at 100% 0%, rgba(67, 56, 202, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            background-color: #ffffff;
        }

        .quote-bar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 70;
            background-color: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            color: white;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .quote-text {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            width: 100%;
            display: block;
        }

        .premium-card {
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 2.5rem;
            padding: 2rem;
            transition: all 0.5s ease;
            cursor: pointer;
            box-shadow: 0 4px 12px -2px rgba(15, 23, 42, 0.03);
        }

        .premium-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px -10px rgba(67, 56, 202, 0.12);
            border-color: rgba(67, 56, 202, 0.3);
        }

        /* ANKI CARD Challenge STYLES */
        .anki-card { perspective: 1000px; height: 480px; width: 100%; max-width: 500px; margin: 0 auto; cursor: pointer; }
        .anki-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .anki-card.flipped .anki-card-inner { transform: rotateY(180deg); }
        .anki-front, .anki-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 3.5rem;
            border-width: 2px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .anki-front { border-color: #f1f5f9; background-color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 2; transform: rotateY(0deg); }
        .anki-back { border-color: #e0e7ff; background-color: #eef2ff; transform: rotateY(180deg); box-shadow: 0 10px 30px rgba(67, 56, 202, 0.1); z-index: 1; }

        .font-kannada { line-height: 1.6; }
        .logo-box { animation: box-pulse 4s ease-in-out infinite; }
        @keyframes box-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .view-transition { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .break-word-custom { overflow-wrap: anywhere; word-break: break-word; hyphens: auto; }

        /* QUIZ FEEDBACK STYLES */
        .option-correct { border-color: #10b981 !important; background-color: #ecfdf5 !important; color: #065f46 !important; border-width: 3px !important; }
        .option-wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b !important; border-width: 3px !important; }
        .explanation-box { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="quote-bar">
        <span id="floating-quote" class="quote-text">Stay Disciplined. Excellence is a daily habit. 🎯</span>
    </div>

    <nav class="fixed top-10 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4 group cursor-pointer" onclick="navigateTo('home')">
                <div class="relative flex items-center justify-center logo-box">
                    <svg width="36" height="36" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="#4338ca"/><path d="M15 28V12H21.5C24.5376 12 27 14.4624 27 17.5C27 20.5376 24.5376 23 21.5 23H15" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <span class="text-xl font-black tracking-tighter uppercase font-bold">PrepEase</span>
            </div>
            <div id="auth-header-btn"></div>
        </div>
    </nav>

    <main id="app-shell" class="pt-[120px] min-h-screen">
        <!-- Views load here -->
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAh6pjj_eOmw2I6FMM63bDmwj5eIlbvZAI",
            authDomain: "prepease-app.firebaseapp.com",
            projectId: "prepease-app",
            storageBucket: "prepease-app.firebasestorage.app",
            messagingSenderId: "200948432412",
            appId: "1:200948432412:web:de0582b6437305c822a9d9",
            measurementId: "G-5673GJ545C"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'prepease-app';

        const state = {
            view: 'home',
            isAuthenticated: false,
            userName: '',
            userId: null,
            progress: {},
            mistakes: [],
            totalPoints: 0,
            totalCoins: 0,
            authMode: 'login',
            currentAnkiIndex: 0,
            isAnkiFlipped: false,
            currentStudyIndex: 0,
            currentStudyFlipped: false,
            currentQuizIndex: 0,
            currentQuizAnswers: {} 
        };
        window.state = state;

        const floatingQuotes = [
            "Believe in your potential. Excellence is a habit. 🎯",
            "Mistakes are lessons in disguise. 📚",
            "Aspirant to Officer: Keep moving. 🏛️",
            "Persistence beats resistance. ⚡",
            "Precision is the path to success. 💎",
            "Believe. Practice. Succeed. 🏆"
        ];

        const topicsData = {
            grammar: [
                { id: 'nouns', title: 'Nouns & Case', icon: '🔡' },
                { id: 'tenses', title: 'Tense Mastery', icon: '⏳' },
                { id: 'articles', title: 'Articles', icon: '🅰️' }
            ],
            vocabulary: [
                { id: 'synonyms', title: 'Synonyms', icon: '📖' },
                { id: 'antonyms', title: 'Antonyms', icon: '🌓' },
                { id: 'idioms', title: 'Idioms & Phrases', icon: '🎭' },
                { id: 'one-word-sub', title: 'One Word Substitution', icon: '🎯' },
                { id: 'spellings', title: 'Spelling Mastery', icon: '✏️' },
                { id: 'phrasal-verbs', title: 'Phrasal Verbs', icon: '🔗' },
                { id: 'confusing-words', title: 'Confusing Words', icon: '❓' },
                { id: 'root-words', title: 'Root Words', icon: '🌱' },
                { id: 'foreign-terms', title: 'Foreign Terms', icon: '🌐' }
            ]
        };

        // --- NAVIGATION & HISTORY ---
        window.navigateTo = (view, params = {}, fromPopState = false) => {
            const protectedViews = ['english-selection', 'topics-grid', 'levels-grid', 'content-view', 'mistakes-book', 'doubts', 'exams-pyq'];
            if (protectedViews.includes(view) && !state.isAuthenticated) {
                state.view = 'login';
            } else {
                state.view = view;
            }
            
            if (view === 'content-view') {
                state.currentStudyIndex = 0;
                state.currentStudyFlipped = false;
                state.currentQuizIndex = 0;
                state.currentQuizAnswers = {};
            }

            Object.assign(state, params);
            if (!fromPopState) {
                history.pushState({ view, params: JSON.parse(JSON.stringify(params)) }, '', "");
            }
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.addEventListener('popstate', (event) => {
            if (event.state) window.navigateTo(event.state.view, event.state.params, true);
            else window.navigateTo('home', {}, true);
        });

        if (!history.state) history.replaceState({ view: 'home', params: {} }, '', "");

        window.handleLogout = async () => { 
            await signOut(auth); 
            state.isAuthenticated = false; 
            state.userName = '';
            state.userId = null;
            navigateTo('login'); 
        };

        async function handleAuth(e) {
            e.preventDefault();
            const userIn = document.getElementById('username-input').value;
            const passIn = document.getElementById('password-input').value;
            const isSignUp = state.authMode === 'signup';
            const email = `${userIn.toLowerCase()}@prepease.internal`;
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = isSignUp ? "Creating Profile..." : "Authorizing...";
            try {
                if (isSignUp) {
                    const fullName = document.getElementById('name-input').value;
                    const res = await createUserWithEmailAndPassword(auth, email, passIn);
                    await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'info'), { 
                        name: fullName, username: userIn, joinedAt: new Date().toISOString() 
                    });
                    state.userName = fullName;
                } else {
                    await signInWithEmailAndPassword(auth, email, passIn);
                }
                navigateTo('home');
            } catch (err) { 
                alert(isSignUp ? "Signup Failed: Username ID might be taken." : "Access Denied: Check Username/Password."); 
                btn.disabled = false;
                btn.innerText = isSignUp ? "Create Account" : "Authorize";
            }
        }

        async function loadUserData() {
            if (!auth.currentUser) return;
            state.userId = auth.currentUser.uid;
            const profileSnap = await getDoc(doc(db, 'artifacts', appId, 'users', state.userId, 'profile', 'info'));
            if (profileSnap.exists()) {
                state.userName = profileSnap.data().name;
                state.isAuthenticated = true;
                render();
            }
            onSnapshot(collection(db, 'artifacts', appId, 'users', state.userId, 'progress'), (snap) => {
                state.progress = {}; state.totalPoints = 0; state.totalCoins = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    state.progress[doc.id] = d;
                    state.totalPoints += (d.points || 0);
                    state.totalCoins += (d.coins || 0);
                });
                if (state.view === 'home' || state.view === 'levels-grid') render();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'users', state.userId, 'mistakes'), (snap) => {
                state.mistakes = [];
                snap.forEach(doc => state.mistakes.push({ id: doc.id, ...doc.data() }));
                if (state.view === 'home' || state.view === 'mistakes-book') render();
            });
        }

        function render() {
            const shell = document.getElementById('app-shell');
            const authBtn = document.getElementById('auth-header-btn');
            if (state.isAuthenticated) {
                authBtn.innerHTML = `<button onclick="handleLogout()" class="text-[10px] font-black uppercase tracking-widest text-rose-500 px-4 py-2 hover:bg-rose-50 rounded-xl transition-all font-bold">Sign Out</button>`;
            } else {
                authBtn.innerHTML = `<button onclick="navigateTo('login')" class="text-[10px] font-black uppercase tracking-widest text-indigo-600 px-4 py-2 hover:bg-indigo-50 rounded-xl transition-all font-bold">Join Now</button>`;
            }
            if (!state.isAuthenticated && state.view !== 'login') state.view = 'login';

            switch(state.view) {
                case 'home': shell.innerHTML = renderHome(); break;
                case 'login': shell.innerHTML = renderLogin(); break;
                case 'mistakes-book': shell.innerHTML = renderMistakesBook(); break;
                case 'doubts': shell.innerHTML = renderDoubts(); break;
                case 'english-selection': shell.innerHTML = renderEnglishSelection(); break;
                case 'topics-grid': shell.innerHTML = renderTopicsGrid(); break;
                case 'levels-grid': shell.innerHTML = renderLevelsGrid(); break;
                case 'exams-pyq': shell.innerHTML = renderExamsPYQ(); break;
                case 'content-view': shell.innerHTML = `<div id="content-container" class="max-w-6xl mx-auto px-6 py-10"></div>`; loadContent(); break;
            }
        }
        window.render = render;

        // --- STUDY CARDS LOGIC ---
        window.loadContent = async () => {
            const container = document.getElementById('content-container');
            const { currentType: type, currentTopic: topic, currentLevel: level } = state;
            
            container.innerHTML = `<button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 uppercase text-xs font-bold">← Back</button><div class="py-20 text-center animate-pulse text-slate-400 uppercase text-xs font-bold">Opening Lesson...</div>`;
            
            const patterns = [`level-${level}.json`, `level${level}.json` ];
            let data = null;

            for (const pattern of patterns) {
                try {
                    const res = await fetch(`./content/general-english/${type}/${topic}/${pattern}`);
                    if (res.ok) { data = await res.json(); break; }
                } catch (e) {}
            }
            
            if (data) {
                window.activeStudyData = data;
                renderStudyCardUI();
            } else {
                container.innerHTML = `<button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 uppercase text-xs font-bold">← Back</button><div class="text-center p-20 bg-white rounded-[3rem] border-2 border-slate-100 font-bold"><div class="text-5xl mb-6 font-bold">📁</div><h3 class="font-bold text-xl">Phase Offline</h3></div>`;
            }
        };

        function renderStudyCardUI() {
            const container = document.getElementById('content-container');
            const data = window.activeStudyData;
            const item = data[state.currentStudyIndex];
            const flipped = state.currentStudyFlipped ? 'flipped' : '';

            container.innerHTML = `
                <button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 hover:text-indigo-600 transition-colors uppercase text-xs tracking-widest font-bold">← Back</button>
                <div class="mb-10 flex justify-between items-center font-bold">
                    <h2 class="text-2xl font-black text-slate-900 tracking-tighter font-bold">Phase ${state.currentLevel} <span class="text-indigo-600 font-bold">Case Study</span></h2>
                    <span class="text-[10px] font-black bg-slate-100 px-4 py-1.5 rounded-full font-bold">${state.currentStudyIndex + 1} / ${data.length}</span>
                </div>
                
                <div class="anki-card ${flipped}" onclick="state.currentStudyFlipped = !state.currentStudyFlipped; renderStudyCardUI();">
                    <div class="anki-card-inner">
                        <div class="anki-front font-bold">
                            <div class="text-7xl mb-8">${item.emoji || '📗'}</div>
                            <h3 class="text-3xl font-black text-slate-900 tracking-tighter break-word-custom text-center font-bold">${item.word}</h3>
                            <p class="mt-12 text-[10px] text-slate-300 uppercase tracking-widest font-bold">Tap to reveal meaning</p>
                        </div>
                        <div class="anki-back font-bold">
                            <p class="text-3xl font-bold text-slate-800 font-kannada leading-tight text-center mb-6 font-bold">${item.meaning_kannada}</p>
                            <p class="text-lg text-slate-500 font-medium leading-relaxed italic text-center font-bold">${item.meaning_english}</p>
                            <p class="mt-12 text-[10px] text-indigo-300 uppercase tracking-widest font-bold">Tap to hide</p>
                        </div>
                    </div>
                </div>

                <div class="max-w-[500px] mx-auto mt-10 grid grid-cols-2 gap-4 font-bold">
                    <button onclick="changeStudyCard(-1)" class="py-5 bg-white border-2 border-slate-100 rounded-[2rem] font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-30 font-bold" ${state.currentStudyIndex === 0 ? 'disabled' : ''}>← Previous</button>
                    ${state.currentStudyIndex === data.length - 1 ? 
                        `<button onclick="loadQuiz()" class="py-5 bg-indigo-600 text-white rounded-[2rem] font-black uppercase text-xs shadow-xl shadow-indigo-100 font-bold">Start Test 🚀</button>` :
                        `<button onclick="changeStudyCard(1)" class="py-5 bg-white border-2 border-slate-100 rounded-[2rem] font-bold text-slate-900 hover:border-indigo-600 transition-all font-bold">Next Word →</button>`
                    }
                </div>
            `;
        }

        window.changeStudyCard = (dir) => {
            state.currentStudyIndex += dir;
            state.currentStudyFlipped = false;
            renderStudyCardUI();
        };

        // --- ASSESSMENT ENGINE ---
        window.loadQuiz = async () => {
            const { currentType: type, currentTopic: topic, currentLevel: level } = state;
            const container = document.getElementById('content-container');
            container.innerHTML = `<button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 uppercase text-xs font-bold">← Back</button><div class="py-20 text-center animate-pulse text-indigo-400 font-bold uppercase text-xs">Loading Assessment...</div>`;

            const patterns = [`level-${level}-test.json`, `level${level}-test.json` ];
            let questions = null;

            for (const pattern of patterns) {
                try {
                    const res = await fetch(`./content/general-english/${type}/${topic}/${pattern}`);
                    if (res.ok) { questions = await res.json(); break; }
                } catch (e) {}
            }

            if (questions) {
                window.activeQuestionsData = questions;
                state.currentQuizIndex = 0;
                state.currentQuizAnswers = {};
                renderQuizUI();
            } else {
                container.innerHTML = `<div class="text-center p-20">Assessment file not found.</div>`;
            }
        };

        function renderQuizUI() {
            const container = document.getElementById('content-container');
            const questions = window.activeQuestionsData;
            const q = questions[state.currentQuizIndex];
            const answerRecord = state.currentQuizAnswers[state.currentQuizIndex];

            container.innerHTML = `
                <button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 hover:text-indigo-600 transition-colors uppercase text-xs tracking-widest font-bold font-bold">← Back</button>
                <div class="mb-10 flex justify-between items-center font-bold">
                    <h2 class="text-2xl font-black text-slate-900 font-bold">Assessment Phase</h2>
                    <span class="text-[10px] font-black bg-slate-900 text-white px-4 py-1.5 rounded-full font-bold">${state.currentQuizIndex + 1} / ${questions.length}</span>
                </div>

                <div class="bg-white p-10 rounded-[3.5rem] border-2 border-slate-100 shadow-sm relative mb-10 font-bold">
                    <p class="text-xl font-bold mb-10 text-slate-800 leading-relaxed font-bold">${q.question}</p>
                    <div class="grid grid-cols-1 gap-4 font-bold">
                        ${q.options.map((o) => {
                            const isSelected = answerRecord?.selected === o.trim();
                            const isCorrect = o.trim() === q.answer.trim();
                            let classes = "flex items-center gap-4 px-8 py-5 border-2 border-slate-50 rounded-[2rem] cursor-pointer transition-all font-bold";
                            if (answerRecord) {
                                if (isCorrect) classes += " option-correct";
                                else if (isSelected) classes += " option-wrong";
                                classes += " pointer-events-none opacity-80";
                            } else {
                                classes += " hover:bg-slate-50";
                            }

                            return `
                                <label class="${classes}">
                                    <input type="radio" name="q" value="${o.trim()}" 
                                           ${isSelected ? 'checked' : ''} 
                                           onchange="handleInstantFeedback(${state.currentQuizIndex}, '${o.trim()}', '${q.answer.trim()}')"
                                           class="accent-indigo-600 w-5 h-5">
                                    <span class="font-bold">${o}</span>
                                </label>
                            `;
                        }).join('')}
                    </div>

                    ${answerRecord ? `
                        <div class="mt-10 p-8 rounded-[2.5rem] ${answerRecord.isCorrect ? 'bg-emerald-50 text-emerald-800 border border-emerald-100' : 'bg-rose-50 text-rose-800 border border-rose-100'} explanation-box font-bold">
                             <p class="font-black text-[11px] uppercase tracking-[0.1em] mb-3 text-slate-400 font-bold">Mastery Insight & Meanings</p>
                             <p class="text-base font-medium leading-relaxed font-bold">${q.explanation || 'The correct answer is: ' + q.answer}</p>
                        </div>
                    ` : ''}
                </div>

                <div class="grid grid-cols-2 gap-4 font-bold">
                    <button onclick="changeQuizQuestion(-1)" class="py-5 bg-white border-2 border-slate-100 rounded-[2rem] font-bold text-slate-600 disabled:opacity-30 font-bold" ${state.currentQuizIndex === 0 ? 'disabled' : ''}>← Previous</button>
                    ${state.currentQuizIndex === questions.length - 1 ? 
                        `<button onclick="submitFinalResults()" class="py-5 bg-indigo-600 text-white rounded-[2rem] font-black uppercase text-xs shadow-xl shadow-indigo-100 font-bold">Finish Session 🎯</button>` :
                        `<button onclick="changeQuizQuestion(1)" class="py-5 bg-white border-2 border-slate-100 rounded-[2rem] font-bold text-slate-900 hover:border-indigo-600 transition-all font-bold">Next Question →</button>`
                    }
                </div>
            `;
        }

        window.handleInstantFeedback = function(qIndex, selected, correct) {
            const isCorrect = selected === correct;
            state.currentQuizAnswers[qIndex] = { selected, isCorrect };
            renderQuizUI();
        };

        window.changeQuizQuestion = (dir) => {
            state.currentQuizIndex += dir;
            renderQuizUI();
        };

        window.submitFinalResults = async function() {
            const questions = window.activeQuestionsData;
            let score = 0;
            let mistakesFound = [];

            questions.forEach((q, i) => {
                const record = state.currentQuizAnswers[i];
                if (record && record.isCorrect) score++;
                else {
                    mistakesFound.push({ 
                        question: q.question, 
                        answer: q.answer, 
                        options: q.options, 
                        explanation: q.explanation || `Correct answer is: ${q.answer}`
                    });
                }
            });

            await saveResultToCloud(score, questions.length, score * 10, score, mistakesFound);
            
            const shell = document.getElementById('app-shell');
            shell.innerHTML = `
                <div class="max-w-xl mx-auto py-20 px-6 text-center view-transition font-bold">
                    <div class="bg-white border-2 border-indigo-100 p-16 rounded-[4rem] shadow-xl font-bold">
                        <p class="text-7xl mb-6">🏆</p>
                        <h2 class="text-4xl font-black text-slate-900 mb-4 tracking-tighter font-bold">Results Analyzed</h2>
                        <div class="flex justify-center items-baseline gap-2 mb-8 font-bold">
                            <span class="text-7xl font-black text-indigo-600">${score}</span>
                            <span class="text-2xl text-slate-300">/ ${questions.length}</span>
                        </div>
                        <button onclick="navigateTo('home')" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl uppercase tracking-widest text-xs">Return Dashboard</button>
                    </div>
                </div>
            `;
        };

        async function saveResultToCloud(score, total, points, coins, mistakes) {
            if (!auth.currentUser) return;
            const progressId = `${state.currentType}_${state.currentTopic}_${state.currentLevel}`;
            await setDoc(doc(db, 'artifacts', appId, 'users', state.userId, 'progress', progressId), { score, total, points, coins, completedAt: new Date().toISOString(), type: state.currentType, topic: state.currentTopic, level: state.currentLevel });
            for (const m of mistakes) {
                const mId = btoa(m.question.substring(0, 30)).substring(0, 20);
                await setDoc(doc(db, 'artifacts', appId, 'users', state.userId, 'mistakes', mId), { ...m, masteryCount: 0 }, { merge: true });
            }
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', state.userId), { name: state.userName, points: (state.totalPoints || 0) + points }, { merge: true });
        }

        // --- VIEWS ---
        window.handleLevelSelection = (lv, progressId) => { 
            const isDone = state.progress[progressId]; 
            if (isDone) { 
                const shell = document.getElementById('app-shell'); 
                shell.innerHTML = `
                <div class="max-w-xl mx-auto py-10 px-6 text-left view-transition font-bold">
                    <button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 hover:text-indigo-600 transition-colors uppercase text-xs tracking-widest">← Back</button>
                    <div class="bg-white border-2 border-emerald-100 p-12 rounded-[3.5rem] shadow-xl text-center">
                        <span class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center text-3xl mb-8 mx-auto font-bold font-bold">🏆</span>
                        <h2 class="text-3xl font-black text-slate-900 mb-2 font-bold font-bold">Phase ${lv} Complete</h2>
                        <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px] mb-8 font-bold font-bold">Performance: ${isDone.score}/${isDone.total}</p>
                        <div class="space-y-4">
                            <button onclick="navigateTo('content-view', { currentLevel: ${lv} })" class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-xl uppercase tracking-widest text-xs font-bold font-bold">Review Lessons</button>
                            <button onclick="state.currentLevel = ${lv}; state.view = 'content-view'; render(); loadQuiz();" class="w-full py-5 border-2 border-slate-100 text-slate-600 font-black rounded-2xl hover:bg-slate-50 transition-all uppercase tracking-widest text-xs font-bold font-bold">Reattempt Quiz</button>
                        </div>
                    </div>
                </div>`; 
            } else { 
                navigateTo('content-view', { currentLevel: lv }); 
            } 
        };

        function renderLogin() {
            const isLogin = state.authMode === 'login';
            return `<div class="max-w-md mx-auto py-32 px-6 view-transition text-center font-bold font-bold font-bold"><h2 class="text-4xl font-black text-slate-900 tracking-tighter mb-10 font-bold font-bold">${isLogin ? 'Mission Login' : 'Enroll Academy'}</h2><form id="auth-form" class="bg-white border border-slate-200 p-10 rounded-[3rem] shadow-sm text-left font-bold font-bold font-bold">${!isLogin ? `<label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 font-bold font-bold font-bold">Full Name</label><input id="name-input" type="text" placeholder="Name" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold mb-6 outline-none focus:border-indigo-600 transition-all font-bold font-bold" required>` : ''}<label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 font-bold font-bold font-bold">Username ID</label><input id="username-input" type="text" placeholder="ID" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold mb-6 outline-none focus:border-indigo-600 transition-all font-bold font-bold" required><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 font-bold font-bold font-bold">Password</label><input id="password-input" type="password" placeholder="••••••••" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold mb-10 outline-none focus:border-indigo-600 transition-all font-bold font-bold" required><button type="submit" class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-xl uppercase text-xs font-bold font-bold">Authorize</button><button type="button" onclick="state.authMode = '${state.authMode === 'login' ? 'signup' : 'login'}'; render();" class="mt-8 w-full text-indigo-600 font-bold text-xs hover:underline font-bold font-bold">${state.authMode === 'login' ? "New? Create ID" : "Login Now"}</button></form></div>`;
        }

        function renderHome() {
            const rank = (p) => p < 500 ? '🌱 Junior' : p < 2000 ? '⚔️ Warrior' : '🏛️ Officer';
            return `<div class="hero-gradient p-10 view-transition font-bold font-bold font-bold"><div class="max-w-7xl mx-auto"><div class="mb-12 font-bold font-bold"><h2 class="text-6xl font-black text-slate-900 tracking-tighter mb-4 leading-tight font-bold font-bold">Hello, <span class="text-indigo-600 font-bold font-bold">${state.userName || 'Aspirant'}!</span></h2></div><div class="mb-12 font-bold font-bold font-bold"><div class="bg-indigo-600 p-12 rounded-[3.5rem] text-white shadow-2xl shadow-indigo-200 flex flex-col md:flex-row justify-between items-center gap-8 font-bold font-bold"><div class="text-center md:text-left font-bold font-bold"><p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2 font-bold font-bold">Progress</p><p class="text-7xl font-black leading-none font-bold font-bold">${state.totalPoints || 0}</p><p class="text-sm font-bold opacity-80 mt-2 uppercase tracking-tighter font-bold font-bold">Mastery Points</p></div><div class="flex gap-6 font-bold font-bold"><div class="bg-white/10 p-6 rounded-3xl text-center border border-white/5 font-bold font-bold"><p class="text-2xl font-black font-bold font-bold">🪙 ${state.totalCoins || 0}</p><p class="text-[9px] font-black uppercase opacity-60 mt-1 font-bold font-bold">Coins</p></div><div class="bg-white/10 p-6 rounded-3xl text-center border border-white/5 font-bold font-bold"><p class="text-2xl font-black font-bold font-bold">${rank(state.totalPoints)}</p><p class="text-[9px] font-black uppercase opacity-60 mt-1 font-bold font-bold">Status</p></div></div></div></div><div class="mb-16 font-bold font-bold"><h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-8 font-bold">Curriculum Units</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-6 font-bold font-bold"><div onclick="navigateTo('english-selection')" class="premium-card group font-bold font-bold"><div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-3xl mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-all font-bold font-bold">🇬🇧</div><h3 class="text-xl font-bold text-slate-900 mb-2 font-bold font-bold">General English</h3><p class="text-slate-500 text-xs font-bold font-bold">Levels 1-10 roadmap.</p></div><div onclick="navigateTo('mistakes-book')" class="premium-card group font-bold font-bold"><div class="w-14 h-14 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center text-3xl mb-6 group-hover:bg-rose-600 group-hover:text-white transition-all font-bold font-bold">📓</div><h3 class="text-xl font-bold text-slate-900 mb-2 font-bold font-bold">Mistakes Book</h3><p class="text-slate-500 text-xs font-bold font-bold">${state.mistakes.length} errors.</p></div><div onclick="navigateTo('doubts')" class="premium-card group font-bold font-bold"><div class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-3xl mb-6 group-hover:bg-emerald-600 group-hover:text-white transition-all font-bold font-bold font-bold">💬</div><h3 class="text-xl font-bold text-slate-900 mb-2 font-bold font-bold">Support Hub</h3><p class="text-slate-500 text-xs font-bold font-bold">Direct sync.</p></div></div></div></div></div>`;
        }

        function renderEnglishSelection() { 
            return `<div class="max-w-7xl mx-auto px-6 py-10 text-left view-transition font-bold font-bold font-bold">
                <button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 hover:text-indigo-600 transition-colors uppercase text-xs tracking-widest font-bold font-bold">← Back</button>
                <h2 class="text-4xl font-black mb-12 font-bold font-bold">English <span class="text-indigo-600 font-bold font-bold">Track</span></h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 text-left font-bold font-bold">
                    <div onclick="navigateTo('topics-grid', { currentType: 'grammar' })" class="premium-card group font-bold font-bold"><span>Rule Foundations</span><h3 class="text-3xl font-black mb-4 font-bold font-bold">Grammar</h3><p class="mb-8 font-bold font-bold">Master Foundations.</p><span class="font-bold font-bold">Open Unit ➜</span></div>
                    <div onclick="navigateTo('topics-grid', { currentType: 'vocabulary' })" class="premium-card group font-bold font-bold"><span>Recall Case</span><h3 class="text-3xl font-black mb-4 font-bold font-bold">Vocabulary</h3><p class="mb-8 font-bold font-bold">Recall mappings.</p><span class="font-bold font-bold">Open Unit ➜</span></div>
                </div>
            </div>`; 
        }

        function renderTopicsGrid() { 
            const topics = topicsData[state.currentType] || []; 
            return `<div class="max-w-7xl mx-auto px-6 py-10 text-left view-transition font-bold font-bold font-bold">
                <button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 hover:text-indigo-600 transition-colors uppercase text-xs tracking-widest font-bold font-bold">← Back</button>
                <h2 class="text-4xl font-black capitalize mb-12 font-bold font-bold">${state.currentType} Mastery</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 text-left font-bold font-bold">
                    ${topics.map(t => `<div onclick="navigateTo('levels-grid', { currentTopic: '${t.id}', currentTopicTitle: '${t.title}' })" class="premium-card p-10 group font-bold font-bold"><div class="text-5xl mb-8 font-bold font-bold">${t.icon}</div><h3 class="text-xl font-bold mb-4 font-bold font-bold">${t.title}</h3><p class="text-[9px] opacity-60 uppercase font-bold font-bold">Integrated Phase</p></div>`).join('')}
                </div>
            </div>`; 
        }

        function renderLevelsGrid() { 
            return `<div class="max-w-7xl mx-auto px-6 py-10 text-left view-transition font-bold font-bold font-bold font-bold">
                <button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 hover:text-indigo-600 transition-colors uppercase text-xs tracking-widest font-bold font-bold">← Back</button>
                <h2 class="text-4xl font-black mb-16 font-bold font-bold">${state.currentTopicTitle} Phases</h2>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-6 font-bold font-bold">
                    ${Array.from({length: 10}, (_, i) => i + 1).map(lv => { const progressId = `${state.currentType}_${state.currentTopic}_${lv}`; const isDone = state.progress[progressId]; return `<div onclick="handleLevelSelection(${lv}, '${progressId}')" class="p-10 border-2 ${isDone ? 'border-emerald-500 bg-emerald-50/30' : 'border-slate-100 bg-white'} rounded-[3rem] text-center hover:border-indigo-600 transition-all cursor-pointer relative font-bold font-bold">${isDone ? `<span class="absolute top-4 right-4 text-emerald-600 text-[8px] bg-emerald-100 px-2 rounded-full uppercase border border-emerald-200 font-bold">DONE</span>` : ''}<span class="text-4xl font-bold font-bold">${lv}</span></div>`; }).join('')}
                </div>
            </div>`; 
        }

        function renderExamsPYQ() { return `<div class="max-w-7xl mx-auto px-6 py-10 text-left font-bold font-bold">Coming Soon</div>`; }
        function renderDoubts() { return `<div class="max-w-4xl mx-auto py-10 px-6 text-left view-transition font-bold font-bold">Contact Support</div>`; }

        // --- MISTAKES BOOK ---
        function renderMistakesBook() {
            if (state.mistakes.length === 0) {
                return `<div class="max-w-xl mx-auto py-40 text-center view-transition">
                    <div class="text-6xl mb-6">💎</div><h3 class="font-black text-2xl text-slate-900 mb-2 uppercase tracking-tight">Zero Errors</h3>
                    <button onclick="history.back()" class="px-12 py-5 bg-indigo-600 text-white font-black rounded-3xl shadow-xl uppercase text-xs font-bold">Go Back</button>
                </div>`;
            }
            const current = state.mistakes[state.currentAnkiIndex];
            const flippedClass = state.isAnkiFlipped ? 'flipped' : '';
            return `
            <div class="max-w-3xl mx-auto py-10 px-6 view-transition">
                <button onclick="history.back()" class="text-slate-400 font-bold mb-8 flex items-center gap-2 hover:text-indigo-600 transition-colors uppercase text-xs tracking-widest">← Back</button>
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-xl font-black text-slate-900 uppercase tracking-widest font-bold">Mastery Deck</h2>
                    <span class="text-[10px] font-black bg-slate-900 text-white px-4 py-1.5 rounded-full font-bold font-bold">${state.currentAnkiIndex + 1} / ${state.mistakes.length}</span>
                </div>
                <div class="anki-card ${flippedClass}" onclick="state.isAnkiFlipped = !state.isAnkiFlipped; render();">
                    <div class="anki-card-inner">
                        <div class="anki-front">
                            <span class="px-4 py-1.5 bg-rose-50 text-rose-600 rounded-full text-[9px] font-black uppercase mb-8 border border-rose-100 font-bold">Recall Case</span>
                            <h3 class="text-xl font-bold text-slate-900 leading-relaxed mb-10 italic break-word-custom font-bold">"${current.question}"</h3>
                            <p class="text-[10px] text-slate-300 uppercase tracking-widest">Tap to reveal logic</p>
                        </div>
                        <div class="anki-back" onclick="event.stopPropagation();">
                            <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-6 font-bold">Mentor Analysis</p>
                            <div class="bg-white/60 p-8 rounded-[2.5rem] mb-6 w-full border border-indigo-100 font-bold"><p class="text-xl font-bold text-slate-900 leading-tight break-word-custom">${current.answer}</p></div>
                            <p class="text-sm text-indigo-900 font-medium leading-relaxed italic break-word-custom">"${current.explanation || 'Master this rule.'}"</p>
                            <div class="mt-10 flex gap-4">
                                <button onclick="resolveAnki(true)" class="flex-1 py-4 bg-emerald-600 text-white font-black rounded-2xl text-[10px] uppercase shadow-lg font-bold">Got it ✅</button>
                                <button onclick="resolveAnki(false)" class="flex-1 py-4 bg-rose-600 text-white font-black rounded-2xl text-[10px] uppercase shadow-lg font-bold">Still hard ❌</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        window.resolveAnki = async (correct) => {
            if (!state.userId) return;
            const current = state.mistakes[state.currentAnkiIndex];
            const ref = doc(db, 'artifacts', appId, 'users', state.userId, 'mistakes', current.id);
            if (correct) {
                const newCount = (current.masteryCount || 0) + 1;
                if (newCount >= 5) await deleteDoc(ref);
                else await updateDoc(ref, { masteryCount: newCount });
            } else await updateDoc(ref, { masteryCount: 0 });
            state.isAnkiFlipped = false;
            state.currentAnkiIndex = (state.currentAnkiIndex + 1) % (state.mistakes.length || 1);
            render();
        };

        // Init App
        onAuthStateChanged(auth, (user) => { 
            if (user) loadUserData(); 
            else { state.isAuthenticated = false; render(); } 
        });

        document.addEventListener('DOMContentLoaded', () => { 
            render(); 
            document.addEventListener('submit', (e) => { 
                if (e.target.id === 'auth-form') handleAuth(e); 
            }); 
        });

        let fqi = 0;
        setInterval(() => {
            const el = document.getElementById('floating-quote');
            if (!el) return;
            el.style.opacity = '0';
            setTimeout(() => {
                fqi = (fqi + 1) % floatingQuotes.length;
                el.innerText = floatingQuotes[fqi];
                el.style.opacity = '1';
            }, 500);
        }, 6000);
    </script>
</body>
</html>
