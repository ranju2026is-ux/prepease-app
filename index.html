    <style>

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a;

        }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {

            currentCategory: null,

        };

        const topicsData = {
            grammar: [
                { id: 'nouns', title: 'Nouns', icon: '🔡' }, { id: 'pronouns', title: 'Pronouns', icon: '👤' }, { id: 'verbs', title: 'Verbs', icon: '🏃' }, { id: 'adjectives', title: 'Adjectives', icon: '🎨' }, { id: 'adverbs', title: 'Adverbs', icon: '⚡' }, { id: 'tenses', title: 'Tenses', icon: '⏳' }, { id: 'prepositions', title: 'Prepositions', icon: '📍' }, { id: 'conjunctions', title: 'Conjunctions', icon: '🔗' }, { id: 'articles', title: 'Articles', icon: '🅰️' }, { id: 'subject-verb', title: 'Subject-Verb Agreement', icon: '🤝' }, { id: 'voice', title: 'Active & Passive Voice', icon: '📣' }, { id: 'narration', title: 'Direct & Indirect Speech', icon: '💬' }
            ],
            vocabulary: [
                { id: 'synonyms', title: 'Synonyms', icon: '📖' }, { id: 'antonyms', title: 'Antonyms', icon: '🌓' }, { id: 'idioms', title: 'Idioms & Phrases', icon: '🎭' }, { id: 'one-word-sub', title: 'One Word Substitution', icon: '🎯' }, { id: 'phrasal-verbs', title: 'Phrasal Verbs', icon: '🔄' }, { id: 'spellings', title: 'Spelling Mastery', icon: '✏️' }, { id: 'root-words', title: 'Root Words', icon: '🌱' }, { id: 'confusing-words', title: 'Confusing Words', icon: '❓' }
            ]
        };

        const cgl2023Shifts = Array.from({length: 40}, (_, i) => {
            const date = i < 4 ? "14 July" : i < 8 ? "17 July" : i < 12 ? "18 July" : i < 16 ? "19 July" : i < 20 ? "20 July" : i < 24 ? "21 July" : i < 28 ? "24 July" : i < 32 ? "25 July" : i < 36 ? "26 July" : "27 July";
            const shift = (i % 4) + 1; return `${date} Shift-${shift}`;
        });

        const gd2024Shifts = [
            "20-Feb Shift-1", "20-Feb Shift-2", "20-Feb Shift-3", "20-Feb Shift-4",
            "21-Feb Shift-1", "21-Feb Shift-2", "21-Feb Shift-3", "21-Feb Shift-4",
            "22-Feb Shift-1", "22-Feb Shift-2", "22-Feb Shift-3", "22-Feb Shift-4",
            "23-Feb Shift-1", "23-Feb Shift-2", "23-Feb Shift-3", "23-Feb Shift-4",
            "24-Feb Shift-1", "24-Feb Shift-2", "24-Feb Shift-3", "24-Feb Shift-4",
            "26-Feb Shift-1", "26-Feb Shift-2", "26-Feb Shift-3", "26-Feb Shift-4",
            "27-Feb Shift-1", "27-Feb Shift-2", "27-Feb Shift-3", "27-Feb Shift-4",
            "28-Feb Shift-1", "28-Feb Shift-2", "28-Feb Shift-3", "28-Feb Shift-4",
            "29-Feb Shift-1", "29-Feb Shift-2", "29-Feb Shift-3", "29-Feb Shift-4",
            "01-Mar Shift-1", "01-Mar Shift-2", "01-Mar Shift-3", "01-Mar Shift-4",
            "05-Mar Shift-1", "05-Mar Shift-2", "05-Mar Shift-3", "05-Mar Shift-4",
            "06-Mar Shift-1", "06-Mar Shift-2", "06-Mar Shift-3", "06-Mar Shift-4",
            "07-Mar Shift-1", "07-Mar Shift-2", "07-Mar Shift-3", "07-Mar Shift-4",
            "30-Mar Shift-1"
        ];

        // --- NAVIGATION & GESTURES ---
        window.navigateTo = (view, params = {}, fromPopState = false) => {
            Object.assign(state, params);
            state.view = view;
            if (!fromPopState) history.pushState({ view, params: JSON.parse(JSON.stringify(params)) }, '', "");
            window.render();
            document.body.style.overflow = (['content-view', 'mistakes-book', 'results'].includes(view)) ? 'hidden' : 'auto';
        };

        window.startX = 0;
        window.handleTouchStart = (e) => window.startX = e.changedTouches[0].screenX;
        window.handleTouchEnd = (e) => {
            const diff = window.startX - e.changedTouches[0].screenX;
            if (Math.abs(diff) < 50) return;
            if (diff > 50) window.moveNext(); else window.movePrev();
        };

        window.moveNext = () => {
            if (state.view === 'mistakes-book' && state.mistakes.length > 0) {
                state.currentAnkiIndex = (state.currentAnkiIndex + 1) % state.mistakes.length;
                state.ankiSelection = null; window.render();
            } else if (state.activeMode === 'study') {
                if (state.currentStudyIndex < (window.activeStudyData || []).length - 1) { 
                    state.currentStudyIndex++; window.renderStudyCardUI(); 
                } else window.loadQuiz();
            } else if (state.activeMode === 'quiz') {
                if (state.currentQuizIndex < (window.activeQuestionsData || []).length - 1) { 
                    state.currentQuizIndex++; window.renderQuizUI(); 
                }
            }
        };

        window.movePrev = () => {
            if (state.view === 'mistakes-book' && state.mistakes.length > 0) {
                state.currentAnkiIndex = (state.currentAnkiIndex - 1 + state.mistakes.length) % state.mistakes.length;
                state.ankiSelection = null; window.render();
            } else if (state.activeMode === 'study' && state.currentStudyIndex > 0) {
                state.currentStudyIndex--; window.renderStudyCardUI();
            } else if (state.activeMode === 'quiz' && state.currentQuizIndex > 0) {
                state.currentQuizIndex--; window.renderQuizUI();
            }
        };

        // --- AUTH ENGINE ---
        window.handleAuth = async () => {
            const userIn = document.getElementById('username-input').value.trim();
            const passIn = document.getElementById('password-input').value;
            if(!userIn || !passIn) return;
            const email = `${userIn.toLowerCase()}@prepease.internal`;
            state.authError = null;
            window.render();
            try {
                if (state.authMode === 'signup') {
                    const fullName = document.getElementById('name-input').value;
                    const res = await createUserWithEmailAndPassword(auth, email, passIn);
                    await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'info'), { name: fullName, username: userIn });
                } else {
                    await signInWithEmailAndPassword(auth, email, passIn);
                }
            } catch (err) { state.authError = "Check ID/Password."; window.render(); }
        };

        window.handleLogout = async () => {
            await signOut(auth);
            state.isAuthenticated = false;
            state.userId = null;
            window.navigateTo('login');
        };

        // --- DATA ENGINE ---
        async function fetchJSON(url) {
            try { const res = await fetch(url); if (!res.ok) return null; return await res.json(); } catch (e) { return null; }
        }

        async function multiPathFetch(paths) {
            for (let path of paths) { const data = await fetchJSON(path); if (data) return data; }
            return null;
        }

        window.loadGenericContent = async () => {
            const { currentTopic, currentLevel, isSSC, currentShift, currentExam } = state;
            let paths = [];
            if (isSSC) {
                const folder = currentExam === 'SSC GD 2024' ? 'gd2024' : 'cgl2023';
                paths = [`./content/ssc/${folder}/shift-${currentShift}-test.json`, `./content/ssc/${folder}/shift${currentShift}-test.json` ];
            } else {
                const basePath = `./content/general-english/vocabulary/${currentTopic}`;
                paths = [`${basePath}/level-${currentLevel}.json`, `${basePath}/level${currentLevel}.json`, `${basePath}/level-${currentLevel}-test.json`, `${basePath}/level${currentLevel}-test.json` ];
            }
            const data = await multiPathFetch(paths);
            if (data && data.length) {
                if (data[0].question) { window.activeQuestionsData = data; state.currentQuizIndex = 0; state.currentQuizAnswers = {}; state.activeMode = 'quiz'; window.renderQuizUI(); }
                else { window.activeStudyData = data; state.currentStudyIndex = 0; state.activeMode = 'study'; window.renderStudyCardUI(); }
            } else document.getElementById('content-container').innerHTML = `<div class="p-10 text-center font-bold">Content missing.</div>`;
        };

        window.loadQuiz = async () => {
            const { currentTopic, currentLevel, isSSC, currentShift, currentExam } = state;
            const folder = currentExam === 'SSC GD 2024' ? 'gd2024' : 'cgl2023';
            let basePath = isSSC ? `./content/ssc/${folder}` : `./content/general-english/vocabulary/${currentTopic}`;
            let fileName = isSSC ? `shift-${currentShift}-test.json` : `level-${currentLevel}-test.json`;
            let data = await multiPathFetch([`${basePath}/${fileName}`, `${basePath}/${fileName.replace('-', '')}`]);
            if(data) { window.activeQuestionsData = data; state.currentQuizIndex = 0; state.currentQuizAnswers = {}; state.activeMode = 'quiz'; window.renderQuizUI(); }
        };

        window.handleChoice = (sel, cor) => {
            if(state.currentQuizAnswers[state.currentQuizIndex]) return;
            state.currentQuizAnswers[state.currentQuizIndex] = { selected: sel.trim(), isCorrect: sel.trim() === cor.trim() };
            window.renderQuizUI();
        };

        window.submitFinalResults = () => {
            const questions = window.activeQuestionsData;
            let correct = 0, wrong = 0, mistakesFound = [];
            questions.forEach((q, i) => {
                const rec = state.currentQuizAnswers[i];
                if (rec?.isCorrect) correct++; else if (rec?.selected) { wrong++; mistakesFound.push({...q}); }
            });
            const isSSC = !!state.isSSC;
            const score = (correct * (isSSC ? 2.0 : 1.0)) + (wrong * (isSSC ? -0.5 : 0.0));
            state.quizResults = { score, correct, wrong, total: questions.length };
            
            if (state.userId) {
                const folder = state.currentExam === 'SSC GD 2024' ? 'gd2024' : (state.isSSC ? 'cgl2023' : null);
                const progressId = state.isSSC ? `${folder}_shift_${state.currentShift}` : `${state.currentTopic}_level_${state.currentLevel}`;
                setDoc(doc(db, 'artifacts', appId, 'users', state.userId, 'progress', progressId), { score, correct, total: questions.length, points: Math.max(0, Math.round(score)), completedAt: new Date().toISOString() });
                mistakesFound.forEach(m => {
                    const safeId = m.question.toLowerCase().replace(/[^a-z0-9]/gi, '_').substring(0, 50);
                    setDoc(doc(db, 'artifacts', appId, 'users', state.userId, 'mistakes', safeId), { ...m, masteryCount: 0 }, { merge: true });
                });
            }
            window.navigateTo('results');
        };

        // --- RENDERERS ---
        window.renderHome = () => `<div class="p-6 h-full overflow-y-auto bg-white">
            <h1 class="text-3xl font-black mb-4 tracking-tighter">Hello, <span class="text-indigo-600">${state.userName || 'Aspirant'}</span></h1>
            <div class="bg-indigo-600 p-6 rounded-3xl text-white shadow-xl mb-6">
                <p class="text-[8px] opacity-70 uppercase font-bold tracking-widest font-sans">Total Mastery Points</p><p class="text-5xl font-black">${state.totalPoints || 0}</p>
                <div class="mt-2 inline-block bg-white/10 px-3 py-1 rounded-full text-[10px] border border-white/20">${state.totalPoints < 500 ? '🌱 Junior' : state.totalPoints < 2000 ? '⚔️ Warrior' : '🏛️ Officer'}</div>
            </div>

                <div onclick="window.navigateTo('exams-pyq', { currentCategory: 'karnataka' })" class="premium-card font-bold border-emerald-100 flex flex-col items-center justify-center py-8 opacity-50"><span class="text-3xl mb-2">🏛️</span><span>KA Hub</span></div>
                <div onclick="window.navigateTo('mistakes-book')" class="premium-card font-bold border-rose-100 bg-rose-50/30 flex flex-col items-center justify-center py-8"><span class="text-3xl mb-2">🏆</span><span>Mastery Book (${state.mistakes.length})</span></div>
            </div>
        </div>`;

        window.renderResults = () => {
            const res = state.quizResults; if(!res) return window.renderHome();
            return `<div class="p-10 text-center flex flex-col justify-center h-full view-transition bg-white">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 max-w-md mx-auto w-full">
                    <h2 class="text-3xl font-black mb-2 text-slate-900 tracking-tighter font-sans">Mission Complete!</h2>
                    <p class="text-slate-400 uppercase text-[10px] font-bold tracking-widest mb-8">Performance Report</p>
                    <div class="grid grid-cols-2 gap-3 mb-8">
                        <div class="bg-indigo-50 p-6 rounded-3xl text-center"><p class="text-3xl font-black text-indigo-600">${res.correct}</p><p class="text-[8px] font-bold text-indigo-400 uppercase">Correct</p></div>
                        <div class="bg-rose-50 p-6 rounded-3xl text-center"><p class="text-3xl font-black text-rose-600">${res.wrong}</p><p class="text-[8px] font-bold text-rose-400 uppercase">Wrong</p></div>
                        <div class="bg-emerald-50 p-4 rounded-3xl text-center col-span-2"><p class="text-4xl font-black text-emerald-600">${res.score.toFixed(1)}</p><p class="text-[9px] font-bold text-emerald-400 uppercase">Final Marks Earned</p></div>
                    </div>
                    <button onclick="w
